<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgenticAI CEP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    p {
      font-size: 1.1rem;
      color: #9ca3af;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .badge {
      display: inline-block;
      background: #1e2130;
      border: 1px solid #374151;
      border-radius: 9999px;
      padding: 6px 16px;
      font-size: 0.85rem;
      color: #6366f1;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AgenticAI CEP</h1>
    <p>Agentic AI Complex Event Processing platform.<br>Your project is ready — start building!</p>
    <span class="badge">Ready</span>
  </div>
</body>
</html>
